<mat-card class="mx-auto mt-20">
  <div class="text-center">
    <h4 class="mat-h4">Getting started</h4>
  </div>

  <p class="mat-p">Get the package</p>
  <pre><code [highlight]="getPackageCode" [languages]="['bash']"></code></pre>

  <p class="mat-p">Add it to your AppModule</p>
  <pre><code [highlight]="moduleCode" [languages]="['typescript']"></code></pre>

  <p class="mat-p">Use it directly</p>
  <pre><code [highlight]="usageCode" [languages]="['html']"></code></pre>
</mat-card>

<mat-card class="mx-auto mt-20">
  <div class="text-center">
    <h4 class="mat-h4">Properties</h4>
  </div>

  <table mat-table [dataSource]="properties">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Property</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let element">{{ element.type }}</td>
    </ng-container>

    <ng-container matColumnDef="default">
      <th mat-header-cell *matHeaderCellDef>Default</th>
      <td mat-cell *matCellDef="let element">{{ element.default }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>description</th>
      <td mat-cell *matCellDef="let element">{{ element.description }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
