<mat-card class="mx-auto mt-20">
  <div class="text-center">
    <h3 class="mat-h3">Getting started</h3>
  </div>

  <p class="mat-p">Get the package</p>
  <pre><code [highlight]="getPackageCode" [languages]="['bash']"></code></pre>

  <p class="mat-p">Add it to your AppModule</p>
  <pre><code [highlight]="moduleCode" [languages]="['typescript']"></code></pre>

  <p class="mat-p">Use it directly</p>
  <pre><code [highlight]="usageCode" [languages]="['html']"></code></pre>
</mat-card>

<mat-card class="mx-auto mt-20">
  <div class="text-center">
    <h3 class="mat-h3">Usage</h3>
  </div>

  <h4 class="mat-h4">Interfaces</h4>
  <div *ngFor="let interface of interfaces">
    <h5 class="mat-h5">{{ interface.name }}</h5>
    <div *ngFor="let property of interface.properties">
      <pre><code>{{ property.name }}: <span class="text-muted">{{ property.type }}</span></code></pre>
    </div>
  </div>

  <div class="mt-20 mb-20">
  <mat-divider></mat-divider>
  </div>

  <h4 class="mat-h4">Component properties</h4>
  <div *ngFor="let prop of properties">
    <pre><code>{{ prop.name }}: {{ prop.type }}</code></pre>
    <p class="mat-caption text-muted">
      {{ prop.description }}
    </p>
  </div> 

</mat-card>
